name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  env-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify .env is not committed
        run: |
          if git ls-files | grep -qE '^\.env$'; then
            echo "ERROR: .env is tracked by git. Remove it: git rm --cached .env"
            exit 1
          fi
          echo ".env is not tracked — OK"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff yamllint
      - name: ruff check
        run: ruff check .
      - name: yamllint contracts
        run: yamllint contracts/

  test-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pyyaml pytest pydantic
      - name: pytest
        run: pytest tests/test_contracts.py -v

  bundle-validate:
    needs: [env-guard, lint, test-contracts]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: databricks bundle validate
        run: databricks bundle validate --target dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
