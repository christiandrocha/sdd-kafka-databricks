name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  env-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify .env is not committed
        run: |
          if git ls-files | grep -qE '^\.env$'; then
            echo "ERROR: .env is tracked by git. Remove it: git rm --cached .env"
            exit 1
          fi
          echo ".env is not tracked — OK"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff yamllint
      - name: ruff check
        run: ruff check .
      - name: yamllint contracts
        run: yamllint contracts/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install pyyaml pytest pydantic
      # Runs every tests/test_*.py — previously only test_contracts.py ran here,
      # so test_dlt_adapter.py never executed in CI despite existing in the repo.
      - name: pytest
        run: pytest tests/ -v

  bundle-validate:
    needs: [env-guard, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: databricks bundle validate (dev)
        run: databricks bundle validate --target dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_KAFKA_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_KAFKA_TOKEN }}
      # PIPELINE_UNIFICATION: free_edition's resource shape (1 pipeline + 1-task Job,
      # same as dev/prod) changed the most of the 3 targets — validate it explicitly
      # instead of relying on dev's validation to catch free_edition-only breakage.
      - name: databricks bundle validate (free_edition)
        run: databricks bundle validate --target free_edition
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_KAFKA_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_KAFKA_TOKEN }}
