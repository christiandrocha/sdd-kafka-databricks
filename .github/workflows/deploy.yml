name: Deploy

on:
  workflow_dispatch: {}

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: databricks/setup-cli@main
      - name: databricks bundle deploy prod
        run: databricks bundle deploy --target prod
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_KAFKA_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_KAFKA_TOKEN }}
