  catalog:
    description: Unity Catalog name (ubereats_dev or ubereats_prod)
    default: ubereats_dev
  checkpoint_base:
    description: Base path for Structured Streaming checkpoints (Unity Catalog Volume)
    default: /Volumes/ubereats_dev/checkpoints
  landing_base:
    description: Base path for the Kafka export Volume (Bronze source_mode=volume)
    default: /Volumes/ubereats_dev/landing/kafka_export
  bronze_source_mode:
    description: "kafka (streaming, default) or volume (batch, Free Edition)"
    default: kafka
  workspace_root:
    description: Absolute workspace path to bundle root — resolves contract YAML file paths at runtime
    default: /Workspace/Repos/christiandr@gmail.com/sdd-kafka-databricks
  kafka_bootstrap:
    description: Kafka bootstrap servers
    default: localhost:9092
  schema_registry_url:
    description: Confluent Schema Registry URL
    default: http://localhost:8081

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: ubereats_dev
      checkpoint_base: /Volumes/ubereats_dev/checkpoints
      landing_base: /Volumes/ubereats_dev/landing/kafka_export
      bronze_source_mode: kafka
    resources:
      jobs:
        ubereats_pipeline:
          name: ubereats_pipeline
          email_notifications: *email_notifications
          job_clusters: *classic_job_clusters
          tasks: *classic_tasks

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/christiandr@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ubereats_prod
      checkpoint_base: /Volumes/ubereats_prod/checkpoints
      landing_base: /Volumes/ubereats_prod/landing/kafka_export
      bronze_source_mode: kafka
    resources:
      jobs:
        ubereats_pipeline:
          name: ubereats_pipeline
          email_notifications: *email_notifications
          job_clusters: *classic_job_clusters
          tasks: *classic_tasks

  free_edition:
    mode: development
    variables:
      catalog: ubereats_dev
      checkpoint_base: /Volumes/ubereats_dev/checkpoints
      landing_base: /Volumes/ubereats_dev/landing/kafka_export
      bronze_source_mode: volume
    resources:
      jobs:
        ubereats_pipeline:
          name: ubereats_pipeline
          email_notifications: *email_notifications
          tasks: *serverless_tasks
          # No job_clusters — Free Edition only supports serverless compute.
