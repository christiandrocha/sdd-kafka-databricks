# Databricks Asset Bundle — sdd-kafka-databricks v1.2.0
# Pipeline: JSON exports → PostgreSQL → Debezium → Kafka → Databricks → Unity Catalog
# Platform: Uber Eats food delivery (Brazilian market)
# Targets: ubereats_dev (development) / ubereats_prod (production) / free_edition (serverless)
#
# PIPELINE_UNIFICATION (v1.2.0): all 3 targets now run the SAME single Lakeflow Declarative
# Pipeline (resources.pipelines.ubereats_pipeline, see pipelines/ubereats_pipeline.py) and
# the SAME 1-task Job (resources.jobs.ubereats_pipeline) — Bronze (20 domains), Silver (10
# generic + silver_users), Quarantine (11), and Gold (6), 37 tables total, one DAG. This
# supersedes ADR-006's "Explicitly NOT migrated" section (Gold, silver_users, free_edition)
# and the free_edition-specific Kafka-reachability premise informally cited elsewhere as
# "ADR-05" — see docs/adr/007_pipeline_unification.md. The Job exists only because a
# standalone pipeline resource has no native schedule — it carries exactly one
# pipeline_task, kept for scheduling + email_notifications on failure.
#
# Targets differ only by `variables:` (catalog, bronze_source_mode, landing_base) — not by
# code or resource shape. bronze_source_mode picks the branch pipelines/ubereats_pipeline.py's
# register_bronze() takes: "kafka" (spark.readStream, dev/prod default) or "volume"
# (spark.read batch off the landing Volume, free_edition default) — see
# notebooks/pipeline_bronze.ipynb's original source_mode split before this migration retired
# it, and ADR-05 (free_edition's Kafka-reachability premise) as cited above.
#
# Compute: the real workspace behind dev/prod/free_edition is a Free Edition account, which
# only supports serverless compute — no job_clusters/job_cluster_key anywhere in this file.
# DABs has no way to exclude a root-level resource from a single target
# (https://github.com/databricks/cli/issues/2872), so each target still declares its own
# resources.pipelines.ubereats_pipeline / resources.jobs.ubereats_pipeline — both are now
# identical aliases of the same anchor, not three different shapes. The anchors live under
# variables._pipeline_anchors.default (rather than as root-level fields) because the DABs
# schema validator warns on unrecognized top-level fields — variables.<name>.default accepts
# arbitrary YAML/JSON, so it's the only schema-sanctioned home for anchor-only scaffolding.
# This variable is never referenced as ${var._pipeline_anchors}; only the YAML anchors
# defined inside its default: value are used, via <<: *anchor merge keys and *anchor aliases.

bundle:
  name: sdd-kafka-databricks

workspace:
  root_path: /Workspace/Users/christiandr@gmail.com/.bundle/${bundle.name}/${bundle.target}

variables:
  _pipeline_anchors:
    description: "Internal scaffold (not a real input) holding YAML anchors for the single pipeline resource, its 1-task Job, and the shared email notification block, reused via merge keys/aliases elsewhere in this file."
    default:
      pipeline_resource: &pipeline_resource
        name: ubereats_pipeline
        catalog: ${var.catalog}
        # Unity Catalog requires exactly one of schema/target — this pipeline never relies
        # on it since every @dp.table name in ubereats_pipeline.py is already
        # fully-qualified (bronze/silver/quarantine/gold), so the value here is unused.
        schema: bronze
        # The real workspace behind dev/prod/free_edition is a Free Edition account, which
        # only supports serverless compute for Lakeflow pipelines.
        serverless: true
        continuous: false
        libraries:
          - file:
              path: pipelines/ubereats_pipeline.py
        configuration:
          ubereats.catalog: ${var.catalog}
          ubereats.kafka_bootstrap: ${var.kafka_bootstrap}
          ubereats.schema_registry_url: ${var.schema_registry_url}
          ubereats.starting_offsets: earliest
          ubereats.source_mode: ${var.bronze_source_mode}
          ubereats.volume_base: ${var.landing_base}
          # pipelines/ubereats_pipeline.py reads this to sys.path.insert() and locate
          # contracts/*.yml — Lakeflow pipeline execution has no __file__, so it can't
          # derive its own source path the way a notebook or plain script could.
          # ${workspace.file_path} is the DABs-native variable for "where this bundle's
          # source files were synced" — it already resolves correctly per target
          # (dev/prod/free_edition) without hand-reconstructing the .bundle/<name>/<target>
          # path pattern here, including for prod's overridden workspace.root_path.
          bundle.files.path: ${workspace.file_path}

      pipeline_task: &pipeline_task
        task_key: ubereats_pipeline_task
        pipeline_task:
          pipeline_id: ${resources.pipelines.ubereats_pipeline.id}
          full_refresh: false

      email_notifications: &email_notifications
        on_failure:
          - christiandr@gmail.com
        no_alert_for_skipped_runs: true

  catalog:
    description: Unity Catalog name (ubereats_dev or ubereats_prod)
    default: ubereats_dev
  landing_base:
    description: Base path for the Kafka export Volume (Bronze source_mode=volume)
    default: /Volumes/ubereats_dev/landing/kafka_export
  bronze_source_mode:
    description: "kafka (streaming, default) or volume (batch, Free Edition)"
    default: kafka
  kafka_bootstrap:
    description: Kafka bootstrap servers
    default: localhost:9092
  schema_registry_url:
    description: Confluent Schema Registry URL
    default: http://localhost:8081

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: ubereats_dev
      landing_base: /Volumes/ubereats_dev/landing/kafka_export
      bronze_source_mode: kafka
    resources:
      pipelines:
        ubereats_pipeline:
          <<: *pipeline_resource
      jobs:
        ubereats_pipeline:
          name: ubereats_pipeline
          email_notifications: *email_notifications
          # No job_clusters — workspace only supports serverless, same as free_edition.
          tasks:
            - *pipeline_task

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/christiandr@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ubereats_prod
      landing_base: /Volumes/ubereats_prod/landing/kafka_export
      bronze_source_mode: kafka
    resources:
      pipelines:
        ubereats_pipeline:
          <<: *pipeline_resource
      jobs:
        ubereats_pipeline:
          name: ubereats_pipeline
          email_notifications: *email_notifications
          # No job_clusters — workspace only supports serverless, same as free_edition.
          tasks:
            - *pipeline_task

  free_edition:
    mode: development
    variables:
      catalog: ubereats_dev
      landing_base: /Volumes/ubereats_dev/landing/kafka_export
      bronze_source_mode: volume
    resources:
      pipelines:
        ubereats_pipeline:
          <<: *pipeline_resource
      jobs:
        ubereats_pipeline:
          name: ubereats_pipeline
          max_concurrent_runs: 1
          email_notifications: *email_notifications
          # No job_clusters — Free Edition only supports serverless compute. The 37-task
          # notebook job (PIPELINE_UNIFICATION's predecessor) is retired — this target now
          # runs the same single pipeline_task as dev/prod, with bronze_source_mode=volume.
          tasks:
            - *pipeline_task
