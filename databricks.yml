# Databricks Asset Bundle — sdd-kafka-databricks v1.1.0
# Pipeline: JSON exports → PostgreSQL → Debezium → Kafka → Databricks → Unity Catalog
# Platform: Uber Eats food delivery (Brazilian market)
# Targets: ubereats_dev (development) / ubereats_prod (production) / free_edition (serverless)
#
# dev/prod: Bronze (20 domains) + Silver (10 of 11 domains) run as a single Lakeflow
# Declarative Pipeline (resources.pipelines.ubereats_bronze_silver, see
# pipelines/bronze_silver_dlt.py) — docs/adr/006_lakeflow_migration.md. The job has 8
# tasks: 1 pipeline_task + silver_users + 6 gold_*, all depending on the pipeline_task.
#
# free_edition: unchanged, all 37 original notebook tasks (20 Bronze + 10 Silver + 1
# Users + 6 Gold) — Lakeflow serverless support there hasn't been verified, so it keeps
# running pipeline_bronze.ipynb/pipeline_silver.ipynb (source_mode=volume).
#
# Compute: dev/prod use a classic job cluster (job_cluster_key) for the 7 remaining
# notebook tasks — the Lakeflow pipeline manages its own compute separately; free_edition
# uses serverless (no job_clusters at all — Free Edition doesn't support custom compute).
# DABs has no way to exclude a root-level resource from a single target
# (https://github.com/databricks/cli/issues/2872), so each job/pipeline lives entirely
# inside its target's own `resources:` block. The task_definitions anchors (still 37 —
# free_edition needs all of them) and the new lakeflow_tasks/bronze_silver_pipeline_*
# anchors are reused via merge keys — see `lakeflow_tasks`/`serverless_tasks` below.
# The anchors live under `variables._pipeline_anchors.default` (rather than as
# root-level fields) because the DABs schema validator warns on unrecognized
# top-level fields — `variables.<name>.default` accepts arbitrary YAML/JSON, so it's
# the only schema-sanctioned home for anchor-only scaffolding. This variable is never
# referenced as `${var._pipeline_anchors}`; only the YAML anchors defined inside its
# `default:` value are used, via `<<: *anchor` merge keys and `*anchor` aliases.

bundle:
