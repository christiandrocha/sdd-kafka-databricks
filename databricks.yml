        gold_revenue_per_restaurant: &gold_revenue_per_restaurant_task
          task_key: gold_revenue_per_restaurant
          depends_on:
            - task_key: silver_order_items
            - task_key: silver_orders
            - task_key: silver_restaurants
          notebook_task:
            notebook_path: notebooks/cross_domain/gold_revenue_per_restaurant.ipynb
            base_parameters:
              catalog: ${var.catalog}

        gold_user_behavior: &gold_user_behavior_task
          task_key: gold_user_behavior
          depends_on:
            - task_key: silver_search_events
            - task_key: silver_recommendations
            - task_key: silver_users
          notebook_task:
            notebook_path: notebooks/cross_domain/gold_user_behavior.ipynb
            base_parameters:
              catalog: ${var.catalog}

      # LAKEFLOW_MIGRATION (v1.1.0): Bronze (20 domains) + Silver (10 of the 11 domains —
      # silver_users keeps its own bronze_users_mongo/bronze_users_mssql depends_on, see
      # below) are now a single Lakeflow Spark Declarative Pipeline, dev/prod only. Each
      # domain gets its own @dp.table — Unity Catalog Lineage now resolves per domain
      # instead of grouping every parametrized execution under one notebook path. See
      # docs/adr/006_lakeflow_migration.md. free_edition is untouched: serverless_tasks
      # below still runs bronze_*/silver_* as the original 30 notebook tasks.
      bronze_silver_pipeline_resource: &bronze_silver_pipeline_resource
        name: ubereats_bronze_silver
        catalog: ${var.catalog}
        # Unity Catalog requires exactly one of schema/target — this pipeline never
        # relies on it since every @dp.table name in bronze_silver_dlt.py is already
        # fully-qualified (bronze/silver/quarantine), so the value here is unused.
        schema: bronze
        # The real workspace behind dev/prod/free_edition is a Free Edition account,
        # which only supports serverless compute for Lakeflow pipelines.
        serverless: true
        continuous: false
        libraries:
          - file:
              path: pipelines/bronze_silver_dlt.py
        configuration:
          ubereats.catalog: ${var.catalog}
          ubereats.kafka_bootstrap: ${var.kafka_bootstrap}
          ubereats.schema_registry_url: ${var.schema_registry_url}
          ubereats.starting_offsets: earliest

      bronze_silver_pipeline_task: &bronze_silver_pipeline_task
        task_key: bronze_silver_pipeline
        pipeline_task:
          pipeline_id: ${resources.pipelines.ubereats_bronze_silver.id}
          full_refresh: false

      # dev/prod task list: the pipeline_task above replaces the 20 bronze_*/10 silver_*
      # tasks from classic_tasks. silver_users and the 6 gold_* keep their own notebook
      # tasks, with depends_on pointed at bronze_silver_pipeline instead of the individual
      # bronze_*/silver_* task_keys that no longer exist in this target's job.
      lakeflow_tasks: &lakeflow_tasks
        - *bronze_silver_pipeline_task

        - <<: *silver_users_task
          depends_on:
            - task_key: bronze_silver_pipeline
          job_cluster_key: ubereats_cluster

        - <<: *gold_payments_by_status_task
          depends_on:
            - task_key: bronze_silver_pipeline
          job_cluster_key: ubereats_cluster
        - <<: *gold_payment_funnel_task
          depends_on:
            - task_key: bronze_silver_pipeline
          job_cluster_key: ubereats_cluster
        - <<: *gold_payment_lifecycle_task
          depends_on:
            - task_key: bronze_silver_pipeline
          job_cluster_key: ubereats_cluster
        - <<: *gold_driver_performance_task
          depends_on:
            - task_key: bronze_silver_pipeline
          job_cluster_key: ubereats_cluster
        - <<: *gold_revenue_per_restaurant_task
          depends_on:
            - task_key: bronze_silver_pipeline
          job_cluster_key: ubereats_cluster
        - <<: *gold_user_behavior_task
          depends_on:
            - task_key: bronze_silver_pipeline
          job_cluster_key: ubereats_cluster

      classic_job_clusters: &classic_job_clusters
        - job_cluster_key: ubereats_cluster
          new_cluster:
            spark_version: 15.4.x-scala2.12
            # node_type_id: Standard_DS3_v2    # Azure
            # node_type_id: m5.xlarge          # AWS
            # node_type_id: n1-standard-4      # GCP
            node_type_id: Standard_DS3_v2
            num_workers: 2
            data_security_mode: SINGLE_USER
            spark_conf:
              spark.databricks.delta.preview.enabled: "true"
              spark.databricks.delta.changeDataFeed.enabled: "true"

      # The original flat 37-task classic-compute list (classic_tasks) was removed in
      # LAKEFLOW_MIGRATION (v1.1.0) — dev/prod use lakeflow_tasks above instead. The
      # individual task_definitions anchors above are still needed: serverless_tasks
      # below (free_edition) aliases the bronze_*/silver_* ones directly, and
      # lakeflow_tasks above merges the silver_users/gold_* ones with a new depends_on.

      # The original 37 tasks, serverless compute — no job_cluster_key at all. Used only by
      # the free_edition target. This is NOT a flat list of
      # aliases: depends_on is overridden per task to collapse the natural 3-tier
      # fan-out (20 Bronze / 11 Silver / 6 Gold, all independent within their tier)
      # into sequential batches of <=4. Free Edition serverless can't sustain that
      # many concurrent Spark sessions — each layer's first batch is gated on the
      # previous layer's last batch finishing entirely, so at most 4 tasks ever run
      # at once. See ADR-06 addendum / .claude/05_implementation_log.md.
      serverless_tasks: &serverless_tasks
        # Bronze batch 1 — no upstream, starts immediately
        - *bronze_payment_events_task
        - *bronze_gps_events_task
        - *bronze_order_status_task
        - *bronze_search_events_task
        # Bronze batch 2
        - <<: *bronze_recommendations_task
          depends_on: &bronze_b1
            - task_key: bronze_payment_events
            - task_key: bronze_gps_events
            - task_key: bronze_order_status
            - task_key: bronze_search_events
        - <<: *bronze_order_items_task
          depends_on: *bronze_b1
        - <<: *bronze_orders_task
          depends_on: *bronze_b1
        - <<: *bronze_payments_task
          depends_on: *bronze_b1
        # Bronze batch 3
        - <<: *bronze_routes_task
          depends_on: &bronze_b2
            - task_key: bronze_recommendations
            - task_key: bronze_order_items
            - task_key: bronze_orders
            - task_key: bronze_payments
        - <<: *bronze_receipts_task
          depends_on: *bronze_b2
        - <<: *bronze_driver_shifts_task
          depends_on: *bronze_b2
        - <<: *bronze_support_tickets_task
          depends_on: *bronze_b2
        # Bronze batch 4
        - <<: *bronze_users_mongo_task
          depends_on: &bronze_b3
            - task_key: bronze_routes
            - task_key: bronze_receipts
            - task_key: bronze_driver_shifts
            - task_key: bronze_support_tickets
        - <<: *bronze_users_mssql_task
          depends_on: *bronze_b3
        - <<: *bronze_restaurants_task
          depends_on: *bronze_b3
        - <<: *bronze_drivers_task
          depends_on: *bronze_b3
        # Bronze batch 5
        - <<: *bronze_products_task
          depends_on: &bronze_b4
            - task_key: bronze_users_mongo
            - task_key: bronze_users_mssql
            - task_key: bronze_restaurants
            - task_key: bronze_drivers
        - <<: *bronze_menu_sections_task
          depends_on: *bronze_b4
        - <<: *bronze_ratings_task
          depends_on: *bronze_b4
        - <<: *bronze_inventory_task
          depends_on: *bronze_b4

        # Silver batch 1 — gated on all Bronze finishing (last Bronze batch)
        - <<: *silver_payment_events_task
          depends_on: &bronze_b5
            - task_key: bronze_products
            - task_key: bronze_menu_sections
            - task_key: bronze_ratings
            - task_key: bronze_inventory
        - <<: *silver_orders_task
          depends_on: *bronze_b5
        - <<: *silver_payments_task
          depends_on: *bronze_b5
        - <<: *silver_drivers_task
          depends_on: *bronze_b5
        # Silver batch 2
        - <<: *silver_order_items_task
          depends_on: &silver_b1
            - task_key: silver_payment_events
            - task_key: silver_orders
            - task_key: silver_payments
            - task_key: silver_drivers
        - <<: *silver_driver_shifts_task
          depends_on: *silver_b1
        - <<: *silver_restaurants_task
          depends_on: *silver_b1
        - <<: *silver_order_status_task
          depends_on: *silver_b1
        # Silver batch 3
        - <<: *silver_search_events_task
          depends_on: &silver_b2
            - task_key: silver_order_items
            - task_key: silver_driver_shifts
            - task_key: silver_restaurants
            - task_key: silver_order_status
        - <<: *silver_recommendations_task
          depends_on: *silver_b2
        - <<: *silver_users_task
          depends_on: *silver_b2

        # Gold batch 1 — gated on all Silver finishing (last Silver batch)
        - <<: *gold_payments_by_status_task
          depends_on: &silver_b3
            - task_key: silver_search_events
            - task_key: silver_recommendations
            - task_key: silver_users
        - <<: *gold_payment_funnel_task
          depends_on: *silver_b3
        - <<: *gold_payment_lifecycle_task
          depends_on: *silver_b3
        # Gold batch 2
        - <<: *gold_driver_performance_task
          depends_on: &gold_b1
            - task_key: gold_payments_by_status
            - task_key: gold_payment_funnel
            - task_key: gold_payment_lifecycle
        - <<: *gold_revenue_per_restaurant_task
          depends_on: *gold_b1
        - <<: *gold_user_behavior_task
          depends_on: *gold_b1

      email_notifications: &email_notifications
        on_failure:
          - christiandr@gmail.com
        no_alert_for_skipped_runs: true

  catalog:
    description: Unity Catalog name (ubereats_dev or ubereats_prod)
    default: ubereats_dev
  checkpoint_base:
    description: Base path for Structured Streaming checkpoints (Unity Catalog Volume)
    default: /Volumes/ubereats_dev/checkpoints
  landing_base:
    description: Base path for the Kafka export Volume (Bronze source_mode=volume)
    default: /Volumes/ubereats_dev/landing/kafka_export
  bronze_source_mode:
    description: "kafka (streaming, default) or volume (batch, Free Edition)"
    default: kafka
  workspace_root:
    description: Absolute workspace path to deployed bundle source files — resolves contract YAML file paths at runtime
    default: ${workspace.file_path}
  kafka_bootstrap:
    description: Kafka bootstrap servers
    default: localhost:9092
  schema_registry_url:
    description: Confluent Schema Registry URL
    default: http://localhost:8081

targets:
  dev:
    mode: development
    default: true
    variables:
      catalog: ubereats_dev
      checkpoint_base: /Volumes/ubereats_dev/checkpoints
      landing_base: /Volumes/ubereats_dev/landing/kafka_export
      bronze_source_mode: kafka
    resources:
      pipelines:
        ubereats_bronze_silver:
          <<: *bronze_silver_pipeline_resource
      jobs:
        ubereats_pipeline:
          name: ubereats_pipeline
          email_notifications: *email_notifications
          job_clusters: *classic_job_clusters
          tasks: *lakeflow_tasks

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/christiandr@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: ubereats_prod
      checkpoint_base: /Volumes/ubereats_prod/checkpoints
      landing_base: /Volumes/ubereats_prod/landing/kafka_export
      bronze_source_mode: kafka
    resources:
      pipelines:
        ubereats_bronze_silver:
          <<: *bronze_silver_pipeline_resource
      jobs:
        ubereats_pipeline:
          name: ubereats_pipeline
          email_notifications: *email_notifications
          job_clusters: *classic_job_clusters
          tasks: *lakeflow_tasks

  free_edition:
    mode: development
    variables:
      catalog: ubereats_dev
      checkpoint_base: /Volumes/ubereats_dev/checkpoints
      landing_base: /Volumes/ubereats_dev/landing/kafka_export
      bronze_source_mode: volume
    resources:
      jobs:
        ubereats_pipeline:
          name: ubereats_pipeline
          max_concurrent_runs: 1
          email_notifications: *email_notifications
          tasks: *serverless_tasks
          # No job_clusters — Free Edition only supports serverless compute.
          # max_concurrent_runs caps overlapping *runs* of this job; task-level
          # concurrency within a single run is capped separately via depends_on
          # batching in serverless_tasks above (max 4 tasks running at once).
