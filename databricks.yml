# Databricks Asset Bundle — sdd-kafka-databricks v1.1.0
# Pipeline: JSON exports → PostgreSQL → Debezium → Kafka → Databricks → Unity Catalog
# Platform: Uber Eats food delivery (Brazilian market)
# Targets: ubereats_dev (development) / ubereats_prod (production) / free_edition (serverless)
# Tasks: 37 total — 20 Bronze + 10 Silver + 1 Users + 6 Gold
#
# Compute: dev/prod use a classic job cluster (job_cluster_key); free_edition uses
# serverless (no job_clusters at all — Free Edition doesn't support custom compute).
# DABs has no way to exclude a root-level resource from a single target
# (https://github.com/databricks/cli/issues/2872), so each job lives entirely inside
# its target's own `resources:` block. The 37 tasks are defined once as YAML anchors
# and reused by both job bodies via merge keys — see `classic_tasks`/`serverless_tasks`
# below. The anchors live under `variables._pipeline_anchors.default` (rather than as
# root-level fields) because the DABs schema validator warns on unrecognized
# top-level fields — `variables.<name>.default` accepts arbitrary YAML/JSON, so it's
# the only schema-sanctioned home for anchor-only scaffolding. This variable is never
# referenced as `${var._pipeline_anchors}`; only the YAML anchors defined inside its
# `default:` value are used, via `<<: *anchor` merge keys and `*anchor` aliases.

bundle:
  name: sdd-kafka-databricks

workspace:
  root_path: /Workspace/Users/christiandr@gmail.com/.bundle/${bundle.name}/${bundle.target}

variables:
  _pipeline_anchors:
