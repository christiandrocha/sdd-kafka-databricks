table:
  name: restaurants
  layers: [bronze, silver]
  source: mysql_restaurants
  kafka_topic: pg.public.restaurants
  merge_key: uuid

schema:
  - { name: uuid,                 type: string,    nullable: false }
  - { name: restaurant_id,        type: integer,   nullable: false }
  - { name: cnpj,                 type: string,    nullable: false }
  - { name: name,                 type: string,    nullable: true  }
  - { name: cuisine_type,         type: string,    nullable: true  }
  - { name: address,              type: string,    nullable: true  }
  - { name: city,                 type: string,    nullable: true  }
  - { name: country,              type: string,    nullable: true  }
  - { name: phone_number,         type: string,    nullable: true  }
  - { name: opening_time,         type: string,    nullable: true  }
  - { name: closing_time,         type: string,    nullable: true  }
  - { name: average_rating,       type: double,    nullable: true  }
  - { name: num_reviews,          type: integer,   nullable: true  }
  - { name: dt_current_timestamp, type: timestamp, nullable: true  }
  - { name: __op,                 type: string,    nullable: true  }
  - { name: __source_ts_ms,       type: long,      nullable: true  }
  - { name: _ingested_at,         type: timestamp, nullable: false }

quality:
  rules:
    - { field: uuid,                 check: not_null,   on_failure: reject,     severity: critical, scope: [bronze]         }
    - { field: cnpj,                 check: not_null,   on_failure: quarantine, severity: critical, scope: [silver]         }
    - { field: dt_current_timestamp, check: not_future, on_failure: warn,       severity: warning,  scope: [bronze, silver] }

storage:
  cluster_by: [uuid]
  compression: zstd
  properties:
    delta.enableChangeDataFeed: true
    delta.autoOptimize.optimizeWrite: true

schema_evolution:
  new_fields: allowed
  removed_fields: forbidden
  type_changes: forbidden
