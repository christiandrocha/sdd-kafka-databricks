table:
  name: order_status
  layers: [bronze, silver]
  source: kafka_status
  kafka_topic: pg.public.order_status
  merge_key: status_id

schema:
  - { name: status_id,            type: integer,   nullable: false }
  - { name: order_identifier,     type: string,    nullable: false }
  - { name: status,               type: string,    nullable: true  }
  - { name: dt_current_timestamp, type: timestamp, nullable: true  }
  - { name: __op,                 type: string,    nullable: true  }
  - { name: __source_ts_ms,       type: long,      nullable: true  }
  - { name: _ingested_at,         type: timestamp, nullable: false }

quality:
  rules:
    - { field: status_id,            check: not_null,   on_failure: reject,     severity: critical, scope: [bronze]         }
    - { field: order_identifier,     check: not_null,   on_failure: quarantine, severity: critical, scope: [silver]         }
    - { field: status,               check: not_null,   on_failure: warn,       severity: warning,  scope: [silver]         }
    - { field: dt_current_timestamp, check: not_future, on_failure: warn,       severity: warning,  scope: [bronze, silver] }

storage:
  cluster_by: [status_id]
  compression: zstd
  properties:
    delta.enableChangeDataFeed: true
    delta.autoOptimize.optimizeWrite: true

schema_evolution:
  new_fields: allowed
  removed_fields: forbidden
  type_changes: forbidden
