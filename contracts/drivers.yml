table:
  name: drivers
  layers: [bronze, silver]
  source: postgres_drivers
  kafka_topic: pg.public.drivers
  merge_key: uuid

schema:
  - { name: uuid,                 type: string,    nullable: false }
  - { name: driver_id,            type: string,    nullable: false }
  - { name: first_name,           type: string,    nullable: true  }
  - { name: last_name,            type: string,    nullable: true  }
  - { name: license_number,       type: string,    nullable: true  }
  - { name: phone_number,         type: string,    nullable: true  }
  - { name: vehicle_type,         type: string,    nullable: true  }
  - { name: vehicle_make,         type: string,    nullable: true  }
  - { name: vehicle_model,        type: string,    nullable: true  }
  - { name: vehicle_year,         type: integer,   nullable: true  }
  - { name: city,                 type: string,    nullable: true  }
  - { name: country,              type: string,    nullable: true  }
  - { name: date_birth,           type: date,      nullable: true  }
  - { name: dt_current_timestamp, type: timestamp, nullable: true  }
  - { name: __op,                 type: string,    nullable: true  }
  - { name: __source_ts_ms,       type: long,      nullable: true  }
  - { name: _ingested_at,         type: timestamp, nullable: false }

quality:
  rules:
    - { field: uuid,                 check: not_null,   on_failure: reject,     severity: critical, scope: [bronze]         }
    - { field: driver_id,            check: not_null,   on_failure: quarantine, severity: critical, scope: [silver]         }
    - { field: dt_current_timestamp, check: not_future, on_failure: warn,       severity: warning,  scope: [bronze, silver] }

storage:
  cluster_by: [uuid]
  compression: zstd
  properties:
    delta.enableChangeDataFeed: true
    delta.autoOptimize.optimizeWrite: true

schema_evolution:
  new_fields: allowed
  removed_fields: forbidden
  type_changes: forbidden
